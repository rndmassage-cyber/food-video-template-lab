# Template Spec: orbit_micro_default
#
# Family: orbit_micro
# Motion: микро-орбитальное вращение камеры вокруг блюда
# Status: draft (Phase 2, ещё не тестировался)

template_id: orbit_micro_default
family_id: orbit_micro
version: 1
status: draft

# --- Параметры генерации ---

supported_angles:
  - top_down
  - three_quarter
  - hero_side
  # Все 3 ракурса — гипотеза из матрицы совместимости (domain-model.md).
  # Подлежит валидации в Phase 6.

supported_aspect_ratios:
  - "1:1"
  - "9:16"
  - "16:9"

supported_durations:
  - 5
  - 10
  # Proposed: начинаем с 5s и 10s как наиболее безопасных.
  # 15s добавляется после подтверждения стабильности в тестах.

# --- Motion intent ---

motion_intent: >
  Плавное микро-орбитальное вращение камеры вокруг блюда
  на 5–15 градусов. Блюдо остаётся в центре кадра.
  Движение минимальное, акцент на объёмность и текстуру.
  Фон стабилен, без изменений.

# --- Prompt pack ---

prompt_pack_id: pp_orbit_micro_default

# --- Precompose ---

precompose_rules:
  aspect_ratio_strategy: precompose  # V1: единственный вариант
  safe_area_margin: "10%"            # proposed, уточняется в Phase 3
  background_fill: source_bg         # proposed, уточняется в Phase 3
  notes: >
    Блюдо должно быть отцентровано с равномерными отступами.
    При орбитальном движении края кадра критичны —
    недостаточный margin может привести к обрезке блюда при вращении.

# --- Ограничения ---

known_limitations:
  - "Орбитальное движение на top_down может выглядеть как простое вращение — требует проверки"
  - "На длительности 15s возможна потеря стабильности движения — не включён в supported_durations до тестов"
  - "Блюда с высокой вертикальной структурой (бургеры, стопки) могут давать артефакты при hero_side"

scoring_hints:
  - "Ключевой критерий: блюдо сохраняет форму на протяжении всего видео"
  - "Фон должен оставаться однотонным, без появления новых объектов"
  - "Движение должно быть плавным, без рывков и скачков"
  - "Камера не должна уходить слишком далеко от начальной позиции"

tags:
  - subtle_motion
  - all_angles
  - safe_starter

